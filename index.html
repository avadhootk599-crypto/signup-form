<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left">
        <div class="logo-banner">
            <img class="logo" src="images/logo.png" alt="Logo">
            <h1>ODIN</h1>
        </div>
        <p class="photo-credit">photo by <a href="https://unsplash.com/@simonmigaj">Simon Migaj</a> on <a href="https://unsplash.com/">Unsplash</a></p>
    </div>
    <div class="right">
        <div class="intro">this is a simple sign-up form not real please don't enter any real information of yours</div>
        <div class="text">welcome to our sign-up form</div>
        <form action="https://httpbin.org/post" method="post">
            <h1 >sign up</h1>
            <div class="form-field">
                <div class="field">
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" name="first-name" minlength="2" maxlength="100" required>
                </div>
                <div class="field">
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name" minlength="2" maxlength="100" required>
                </div>
                <div class="field">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Please enter a valid email address" required>
                </div>
                <div class="field">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" minlength="10" maxlength="15" required>
                </div>
                <div class="field">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character" required>
                </div>
                <div class="field">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character" required>
                </div>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <div class="login">Already have an account? <a href="#">Log in</a></div>      
    </div>
</body>
</html>
