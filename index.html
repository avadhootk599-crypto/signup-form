<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left">
        <div class="logo-banner">
            <img class="logo" src="images/logo.png" alt="Logo">
            <h1>ODIN</h1>
        </div>
        <p class="photo-credit">photo by <a href="https://unsplash.com/@simonmigaj">Simon Migaj</a> on <a href="https://unsplash.com/">Unsplash</a></p>
    </div>
    <div class="right">
        <div class="intro">this is a simple sign-up form not real please don't enter any real information of yours</div>
        <div class="text">welcome to our sign-up form</div>
        <form action="https://httpbin.org/post" method="post">
            <h1 >sign up</h1>
            <div class="form-field">
                <div class="field">
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="field">
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="field">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="field">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="field">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <div class="login">Already have an account? <a href="#">Log in</a></div>      
    </div>
</body>
</html>
